name: Build and Deploy to ECS
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag and push image to ECR
        run: |
          IMAGE_URI=090899138853.dkr.ecr.ap-south-2.amazonaws.com/spring-boot-devops-app-ecr-repo:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          docker tag $IMAGE_URI 090899138853.dkr.ecr.ap-south-2.amazonaws.com/spring-boot-devops-app-ecr-repo:latest
          docker push 090899138853.dkr.ecr.ap-south-2.amazonaws.com/spring-boot-devops-app-ecr-repo:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster spring-boot-devops-app-cluster \
            --service spring-boot-devops-app-service \
            --force-new-deployment \
            --region ap-south-2

